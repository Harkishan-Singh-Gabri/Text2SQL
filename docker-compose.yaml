version: "3.9"

services:

  db:
    image: postgres:15
    container_name: querify-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: northwind
    ports:
      - "5432:5432"
    volumes:
      - querify-db-data:/var/lib/postgresql/data
      - ./northwind.sql:/docker-entrypoint-initdb.d/01_northwind.sql
      - ./db/init.sql:/docker-entrypoint-initdb.d/02_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: querify-api
    command: uvicorn backend.api:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

  streamlit:
    build: .
    container_name: querify-ui
    command: streamlit run frontend/Home.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    env_file: .env
    depends_on:
      - api
    volumes:
      - .:/app

volumes:
  querify-db-data: